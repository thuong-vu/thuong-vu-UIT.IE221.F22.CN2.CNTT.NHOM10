<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Sổ Thu Chi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/tabler-icons.min.css"/>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f0f2f5}
body{font-family:'Inter',system-ui,sans-serif;display:flex;justify-content:center;align-items:flex-start}

/* ── App Shell ────────────────────────────────────────────────────────── */
#app{
  width:100%;max-width:430px;min-height:100svh;
  background:#f0f2f5;
  display:flex;flex-direction:column;
  position:relative;
  box-shadow:0 0 40px rgba(0,0,0,.12);
}

/* ── Header ───────────────────────────────────────────────────────────── */
.header{
  background:linear-gradient(135deg,#1976D2 0%,#2196F3 100%);
  color:#fff;padding:16px 20px 20px;
  position:sticky;top:0;z-index:100;
}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header-logo{display:flex;align-items:center;gap:8px}
.header-logo .logo-icon{
  width:34px;height:34px;background:rgba(255,255,255,.2);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.header-logo h1{font-size:17px;font-weight:700;letter-spacing:.5px}
.header-logo h1 span{opacity:.8;font-weight:400}
.header-bell{
  width:36px;height:36px;background:rgba(255,255,255,.15);
  border-radius:50%;border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:background .2s;
}
.header-bell:hover{background:rgba(255,255,255,.25)}

/* ── Scrollable Content ───────────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;padding-bottom:80px}

/* ── Bottom Nav ───────────────────────────────────────────────────────── */
.bottom-nav{
  position:sticky;bottom:0;
  background:#fff;
  display:flex;border-top:1px solid #e8eaed;
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
  z-index:100;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;border:none;background:transparent;
  cursor:pointer;color:#9e9e9e;transition:color .2s;gap:3px;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn i{font-size:22px;transition:transform .2s}
.nav-btn span{font-size:12px;font-weight:500}
.nav-btn.active{color:#2196F3}
.nav-btn.active i{transform:scale(1.1)}
.nav-btn.nav-add{
  color:#fff;
}
.nav-add-inner{
  width:50px;height:50px;background:linear-gradient(135deg,#1976D2,#42A5F5);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:26px;margin-top:-18px;
  box-shadow:0 4px 16px rgba(33,150,243,.45);
  transition:transform .2s,box-shadow .2s;
}
.nav-btn.nav-add:hover .nav-add-inner,
.nav-btn.nav-add.active .nav-add-inner{
  transform:scale(1.08);box-shadow:0 6px 20px rgba(33,150,243,.55);
}

/* ── Sections ─────────────────────────────────────────────────────────── */
.section{display:none;animation:fadeIn .2s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Cards ────────────────────────────────────────────────────────────── */
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.06)}

/* ── Home Tab ─────────────────────────────────────────────────────────── */
.home-banner{
  background:linear-gradient(135deg,#1976D2,#42A5F5);
  color:#fff;border-radius:0 0 28px 28px;
  padding:24px 20px 32px;text-align:center;
  margin-bottom:-16px;
}
.banner-label{font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.banner-balance{font-size:34px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}
.banner-month{font-size:12px;opacity:.7}

.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:24px 16px 8px}
.summary-card{
  border-radius:14px;padding:14px;
  display:flex;flex-direction:column;gap:4px;
}
.summary-card.income{background:#E3F2FD}
.summary-card.expense{background:#FCE4EC}
.summary-card .sc-label{font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.5px}
.summary-card .sc-amount{font-size:20px;font-weight:700}
.summary-card.income .sc-amount{color:#1565C0}
.summary-card.expense .sc-amount{color:#C62828}
.summary-card .sc-icon{font-size:22px;margin-bottom:2px}
.summary-card.income .sc-icon{color:#1976D2}
.summary-card.expense .sc-icon{color:#E91E63}

.section-title{
  font-size:14px;font-weight:600;color:#424242;
  padding:16px 16px 8px;display:flex;align-items:center;
  justify-content:space-between;
}
.section-title a{font-size:12px;color:#2196F3;text-decoration:none;font-weight:500}

/* ── Transaction List ─────────────────────────────────────────────────── */
.tx-list{padding:0 16px}
.tx-group{margin-bottom:16px}
.tx-group-header{
  font-size:12px;font-weight:600;color:#757575;
  padding:6px 0;text-transform:uppercase;letter-spacing:.5px;
  border-bottom:1px solid #f0f0f0;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
}
.tx-item {
  display:flex;align-items:center;gap:12px;
  /* Đổi padding: 12px thành padding bên dưới để chừa chỗ cho nút xóa */
  padding:12px 46px 12px 12px;
  background:#fff;border-radius:12px;
  margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.05);
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.tx-item:hover {transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.1)}
.tx-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.tx-icon.expense{background:#FCE4EC;color:#E91E63}
.tx-icon.income{background:#E8F5E9;color:#388E3C}
.tx-meta{flex:1;min-width:0}
.tx-meta .tx-cat{font-size:14px;font-weight:600;color:#212121;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta .tx-note{font-size:12px;color:#9e9e9e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.tx-right{text-align:right;flex-shrink:0}
.tx-amount{font-size:15px;font-weight:700}
.tx-amount.expense{color:#E53935}
.tx-amount.income{color:#43A047}
.tx-date{font-size:11px;color:#bdbdbd;margin-top:2px}

.empty-state{
  text-align:center;padding:48px 20px;color:#bdbdbd;
}
.empty-state i{font-size:48px;margin-bottom:12px;display:block}
.empty-state p{font-size:14px}

/* ── Add Tab ──────────────────────────────────────────────────────────── */
.add-form{padding:16px}
.type-toggle{
  display:flex;gap:0;background:#f5f5f5;border-radius:12px;padding:4px;
  margin-bottom:20px;
}
.type-btn{
  flex:1;padding:10px;border:none;background:transparent;
  border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;
  color:#757575;transition:all .2s;display:flex;align-items:center;
  justify-content:center;gap:6px;
}
.type-btn.active.expense{background:#fff;color:#E53935;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.type-btn.active.income{background:#fff;color:#43A047;box-shadow:0 2px 8px rgba(0,0,0,.1)}

.form-group{margin-bottom:18px}
.form-label{font-size:12px;font-weight:600;color:#757575;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block}

.amount-input-wrap{position:relative}
.amount-input{
  width:100%;padding:16px 50px 16px 16px;
  border:2px solid #e0e0e0;border-radius:12px;
  font-size:24px;font-weight:700;color:#212121;
  outline:none;transition:border-color .2s;background:#fafafa;
  font-family:inherit;
}
.amount-input:focus{border-color:#2196F3;background:#fff}
.amount-suffix{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:14px;font-weight:600;color:#9e9e9e;pointer-events:none;
}

.cat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
}
.cat-chip{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:12px 6px;border:2px solid #e0e0e0;border-radius:12px;
  background:#fafafa;cursor:pointer;transition:all .2s;
  font-size:12px;color:#424242;font-weight:500;text-align:center;
}
.cat-chip i{font-size:22px;color:#9e9e9e;transition:color .2s}
.cat-chip.selected.expense{border-color:#E91E63;background:#FCE4EC;color:#C62828}
.cat-chip.selected.expense i{color:#E91E63}
.cat-chip.selected.income{border-color:#43A047;background:#E8F5E9;color:#2E7D32}
.cat-chip.selected.income i{color:#43A047}
.cat-chip:hover{border-color:#90CAF9}

.form-input,.form-textarea{
  width:100%;padding:13px 14px;border:2px solid #e0e0e0;border-radius:12px;
  font-size:14px;color:#212121;outline:none;transition:border-color .2s;
  background:#fafafa;font-family:inherit;
}
.form-input:focus,.form-textarea:focus{border-color:#2196F3;background:#fff}
.form-textarea{resize:none;height:80px}

.save-btn{
  width:100%;padding:16px;background:linear-gradient(135deg,#1976D2,#42A5F5);
  color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:inherit;box-shadow:0 4px 16px rgba(33,150,243,.4);
  margin-top:4px;
}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(33,150,243,.5)}
.save-btn:active{transform:translateY(0)}
.save-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* ── History Tab ──────────────────────────────────────────────────────── */
.filter-bar{
  padding:14px 16px;display:flex;gap:8px;align-items:center;
  background:#fff;border-bottom:1px solid #f0f0f0;
  flex-wrap:wrap;
}
.filter-chip{
  display:flex;align-items:center;gap:5px;
  padding:7px 12px;background:#E3F2FD;color:#1565C0;
  border-radius:20px;font-size:12px;font-weight:600;
  border:none;cursor:pointer;transition:background .2s;
}
.filter-chip:hover{background:#BBDEFB}
.filter-chip .chip-close{color:#1976D2;font-size:14px;margin-left:2px}
.filter-select{
  padding:7px 12px;border:1.5px solid #e0e0e0;border-radius:20px;
  font-size:12px;color:#424242;background:#fafafa;outline:none;
  cursor:pointer;font-family:inherit;font-weight:500;
}
.filter-select:focus{border-color:#2196F3}

/* ── Stats Tab ────────────────────────────────────────────────────────── */
.period-toggle{
  display:flex;gap:0;background:#f5f5f5;border-radius:12px;padding:4px;
  margin:16px 16px 0;
}
.period-btn{
  flex:1;padding:9px 6px;border:none;background:transparent;
  border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;
  color:#757575;transition:all .2s;font-family:inherit;
}
.period-btn.active{background:#fff;color:#1976D2;box-shadow:0 2px 8px rgba(0,0,0,.1)}

.stats-summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.stat-card{border-radius:14px;padding:16px}
.stat-card.income-card{background:linear-gradient(135deg,#E3F2FD,#BBDEFB)}
.stat-card.expense-card{background:linear-gradient(135deg,#FCE4EC,#F8BBD0)}
.stat-card .sc-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-card.income-card .sc-label{color:#1565C0}
.stat-card.expense-card .sc-label{color:#880E4F}
.stat-card .sc-val{font-size:20px;font-weight:700}
.stat-card.income-card .sc-val{color:#0D47A1}
.stat-card.expense-card .sc-val{color:#B71C1C}

.breakdown-list{padding:0 16px 16px}
.breakdown-item{
  display:flex;align-items:center;gap:12px;
  padding:12px;background:#fff;border-radius:12px;
  margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.05);
}
.breakdown-icon{
  width:40px;height:40px;background:#FCE4EC;color:#E91E63;
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.breakdown-meta{flex:1;min-width:0}
.breakdown-name{font-size:13px;font-weight:600;color:#212121;margin-bottom:4px}
.breakdown-bar-wrap{height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden}
.breakdown-bar{height:100%;background:linear-gradient(90deg,#E91E63,#FF80AB);border-radius:2px;transition:width .6s ease}
.breakdown-right{text-align:right;flex-shrink:0}
.breakdown-amount{font-size:13px;font-weight:700;color:#E53935}
.breakdown-pct{font-size:11px;color:#9e9e9e;margin-top:1px}

.export-btn{
  margin:0 16px 16px;width:calc(100% - 32px);padding:14px;
  background:#fff;border:2px solid #2196F3;color:#1976D2;
  border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:inherit;transition:background .2s;
}
.export-btn:hover{background:#E3F2FD}

/* ── Toast ────────────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#323232;color:#fff;padding:12px 20px;border-radius:24px;
  font-size:13px;font-weight:500;white-space:nowrap;
  opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
  z-index:9999;display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:#2E7D32}
.toast.error{background:#C62828}

/* ── Loading ──────────────────────────────────────────────────────────── */
.skeleton{
  background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  border-radius:8px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.loading-overlay{
  position:absolute;inset:0;background:rgba(255,255,255,.7);
  display:flex;align-items:center;justify-content:center;
  z-index:50;border-radius:inherit;
}
.spinner{
  width:28px;height:28px;border:3px solid #e0e0e0;
  border-top-color:#2196F3;border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Nút Xóa Giao Dịch (Luôn hiển thị) ────────────────────────────────── */
.tx-delete {
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background: C94F4F; /* Nền trong suốt mặc định */
  color:#cfcfcf;          /* Màu xám nhạt không làm rối mắt */
  border:none;border-radius:8px;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:all .2s;
}

/* Đổi sang nền đỏ sậm và icon đỏ rực khi người dùng chạm/rê chuột vào */
.tx-delete:hover, .tx-delete:active {
  background:#FFEBEE;
  color:#E53935;
}

/* ── Settings Tab ─────────────────────────────────────────────────────── */
.settings-wrap{padding:16px;display:flex;flex-direction:column;gap:16px}
.settings-group{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.settings-group-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid #f5f5f5;
}
.settings-group-title{font-size:14px;font-weight:600;color:#212121;display:flex;align-items:center;gap:8px}
.add-cat-btn{
  display:flex;align-items:center;gap:4px;
  padding:7px 12px;background:#E3F2FD;color:#1565C0;
  border:none;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;transition:background .2s;font-family:inherit;
}
.add-cat-btn:hover{background:#BBDEFB}
.cat-list-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid #f5f5f5;
  transition:background .15s;
}
.cat-list-item:last-child{border-bottom:none}
.cat-list-item:hover{background:#fafafa}
.cat-item-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.cat-item-icon.expense{background:#FCE4EC;color:#E91E63}
.cat-item-icon.income{background:#E8F5E9;color:#388E3C}
.cat-item-name{flex:1;font-size:14px;font-weight:500;color:#212121}
.cat-delete-btn{
  width:32px;height:32px;border-radius:8px;border:none;
  background:#FFEBEE;color:#E53935;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:background .2s;flex-shrink:0;
}
.cat-delete-btn:hover{background:#FFCDD2}

/* ── Modal / Bottom Sheet ─────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
}
.modal-sheet{
  background:#fff;width:100%;max-width:430px;
  border-radius:20px 20px 0 0;padding:20px 20px 36px;
  max-height:88svh;overflow-y:auto;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.modal-title{font-size:16px;font-weight:700;color:#212121}
.modal-close{
  width:32px;height:32px;border:none;background:#f5f5f5;
  border-radius:50%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:18px;color:#424242;
  transition:background .2s;
}
.modal-close:hover{background:#e0e0e0}

/* ── Icon Picker ──────────────────────────────────────────────────────── */
.icon-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.icon-option{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px 8px;border:2px solid #f0f0f0;border-radius:10px;
  background:#fafafa;cursor:pointer;transition:all .18s;
  font-size:10px;color:#757575;font-family:inherit;
}
.icon-option i{font-size:20px;color:#9e9e9e;transition:color .18s}
.icon-option:hover{border-color:#90CAF9;background:#E3F2FD}
.icon-option:hover i{color:#1976D2}
.icon-option.selected{border-color:#2196F3;background:#E3F2FD;color:#1565C0}
.icon-option.selected i{color:#1976D2}

/* ── Responsive desktop centering ────────────────────────────────────── */
@media(min-width:432px){
  #app{border-radius:0;min-height:100svh}
  .toast{max-width:380px}
}
